<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFI CHECK - Hermes Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #0f3460;
        }

        .header h1 {
            font-size: 1.2rem;
            color: #e94560;
        }

        .status {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected { background: #00ff88; }
        .status-dot.disconnected { background: #ff4444; }
        .status-dot.pending { background: #ffaa00; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user {
            background: #e94560;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.hermes {
            background: #16213e;
            border: 1px solid #0f3460;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message.system {
            background: #0f3460;
            color: #aaa;
            align-self: center;
            font-size: 0.85rem;
            text-align: center;
            max-width: 90%;
        }

        .message .meta {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 15px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #666;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        .input-area {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #0f3460;
        }

        .input-area input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #eee;
            padding: 12px 16px;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: #e94560;
        }

        .input-area button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #ff6b6b;
        }

        .input-area button:disabled {
            background: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💬 FIFI CHECK - Hermes</h1>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Disconnected</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message system">
            Welcome to FIFI CHECK<br>
            <small>Messages are processed by Hermes AI</small>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        // === CONFIGURATION ===
        // Change PROXY_URL to your deployed Proxy Server URL
        const PROXY_URL = 'http://localhost:5000';

        // === STATE ===
        let correlationIndex = 0;

        // === UTILS ===
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function getCorrelationId() {
            return `fifi-${Date.now()}-${++correlationIndex}`;
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString();
        }

        // === UI FUNCTIONS ===
        function setStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            dot.className = 'status-dot ' + status;
            
            switch(status) {
                case 'connected':
                    text.textContent = 'Connected';
                    break;
                case 'disconnected':
                    text.textContent = 'Disconnected';
                    break;
                case 'pending':
                    text.textContent = 'Waiting for reply...';
                    break;
            }
        }

        function addMessage(type, content, meta = '') {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            
            let metaHtml = '';
            if (meta) {
                metaHtml = `<div class="meta">${meta}</div>`;
            }
            
            msg.innerHTML = `${content}${metaHtml}`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function showTypingIndicator() {
            const container = document.getElementById('chatContainer');
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'message hermes typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(indicator);
            container.scrollTop = container.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // === API FUNCTIONS ===
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            const message = input.value.trim();
            
            if (!message) return;
            
            const correlationId = getCorrelationId();
            
            // Disable input while sending
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            
            // Show user message
            addMessage('user', message, formatTime(new Date().toISOString()));
            
            // Show pending status
            setStatus('pending');
            showTypingIndicator();
            
            try {
                const response = await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        correlation_id: correlationId
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Message sent:', data);
                
                // Start polling for response
                startPolling(correlationId);
                
            } catch (error) {
                console.error('Send error:', error);
                hideTypingIndicator();
                addMessage('system', `Failed to send: ${error.message}`);
                setStatus('disconnected');
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        }

        function startPolling(correlationId) {
            let attempts = 0;
            const maxAttempts = 120; // 2 minutes timeout
            
            const pollInterval = setInterval(async () => {
                attempts++;
                
                try {
                    const response = await fetch(`${PROXY_URL}/poll/${correlationId}`);
                    
                    if (response.status === 200) {
                        const data = await response.json();
                        hideTypingIndicator();
                        setStatus('connected');
                        
                        // Display Hermes response
                        addMessage('hermes', data.data.content, formatTime(data.data.timestamp));
                        
                        clearInterval(pollInterval);
                        return;
                    }
                    
                    if (attempts >= maxAttempts) {
                        hideTypingIndicator();
                        addMessage('system', 'Timeout waiting for Hermes response');
                        setStatus('connected');
                        clearInterval(pollInterval);
                    }
                    
                } catch (error) {
                    console.error('Poll error:', error);
                }
            }, 1000); // Poll every second
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // === INIT ===
        async function init() {
            // Check if Proxy is reachable
            try {
                const response = await fetch(`${PROXY_URL}/health`);
                if (response.ok) {
                    setStatus('connected');
                }
            } catch (error) {
                setStatus('disconnected');
                addMessage('system', `Cannot connect to Proxy Server at ${PROXY_URL}<br>Make sure the server is running.`);
            }
            
            document.getElementById('messageInput').focus();
        }

        init();
    </script>
</body>
</html>
