<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFI CHECK 管理後台 📊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7c6a5d;
      --primary-dark: #5a4d42;
      --secondary: #c4a98b;
      --accent: #d4a574;
      --bg-light: #faf8f5;
      --bg-card: #ffffff;
      --bg-warm: #f5f0e8;
      --text-primary: #3d3d3d;
      --text-secondary: #7a7a7a;
      --text-muted: #aaaaaa;
      --border: #e8e4de;
      --success: #8fae8b;
      --warning: #d4a574;
      --danger: #c9928a;
      --info: #8baeaf;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      padding: 40px;
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
    }

    .login-card h1 {
      font-size: 1.4em;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-card p {
      color: var(--text-secondary);
      font-size: 0.85em;
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-secondary);
      font-size: 0.8em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-light);
      color: var(--text-primary);
      font-size: 0.95em;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9em;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--bg-warm);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      opacity: 0.9;
    }

    .btn-success {
      background: var(--success);
      color: #fff;
    }

    .btn-success:hover {
      opacity: 0.9;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 0.8em;
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.8em;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    /* Dashboard */
    .dashboard {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .dashboard-header h1 {
      font-size: 1.3em;
      font-weight: 600;
    }

    .dashboard-actions {
      display: flex;
      gap: 10px;
    }

    /* Tabs */
    .main-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--bg-card);
      padding: 6px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .main-tab {
      flex: 1;
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.9em;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .main-tab:hover {
      background: var(--bg-warm);
    }

    .main-tab.active {
      background: var(--primary);
      color: #fff;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .stat-card h3 {
      font-size: 0.75em;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 2em;
      font-weight: 600;
      color: var(--text-primary);
    }

    .stat-card .sub {
      font-size: 0.75em;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Store Tabs */
    .store-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .store-tab {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.2s;
    }

    .store-tab:hover {
      background: var(--bg-warm);
    }

    .store-tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* Records List */
    .records-list {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .record-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 150px 1fr 200px;
      gap: 20px;
      align-items: start;
    }

    .record-item:last-child {
      border-bottom: none;
    }

    .record-item:hover {
      background: var(--bg-warm);
    }

    .record-time {
      font-size: 0.8em;
      color: var(--text-muted);
    }

    .record-question {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .record-answer {
      font-size: 0.85em;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .record-store {
      font-size: 0.8em;
      color: var(--text-secondary);
      text-align: right;
    }

    .record-store span {
      background: var(--bg-warm);
      padding: 4px 10px;
      border-radius: 20px;
      display: inline-block;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 3em;
      margin-bottom: 16px;
    }

    /* Search */
    .search-bar {
      margin-bottom: 20px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
      font-size: 0.9em;
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* FAQ Management */
    .faq-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .faq-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .faq-filter {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.2s;
    }

    .faq-filter:hover {
      background: var(--bg-warm);
    }

    .faq-filter.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .faq-actions {
      display: flex;
      gap: 8px;
    }

    /* FAQ Categories */
    .faq-category {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .faq-category-header {
      background: var(--bg-warm);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .faq-category-header:hover {
      background: var(--border);
    }

    .faq-category-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 0.95em;
    }

    .faq-category-title .icon {
      font-size: 1.1em;
    }

    .faq-category-count {
      font-size: 0.8em;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .faq-category-arrow {
      transition: transform 0.2s;
      color: var(--text-muted);
    }

    .faq-category.collapsed .faq-category-arrow {
      transform: rotate(-90deg);
    }

    .faq-category.collapsed .faq-list {
      display: none;
    }

    .faq-list {
      padding: 10px;
    }

    .faq-item {
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 8px;
      background: var(--bg-light);
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .faq-item:last-child {
      margin-bottom: 0;
    }

    .faq-item:hover {
      border-color: var(--border);
      background: var(--bg-card);
    }

    .faq-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .faq-item-q {
      font-weight: 500;
      flex: 1;
      margin-bottom: 6px;
    }

    .faq-item-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .faq-item:hover .faq-item-actions {
      opacity: 1;
    }

    .faq-item-a {
      font-size: 0.85em;
      color: var(--text-secondary);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 1.1em;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5em;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-body {
      padding: 20px;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .form-row {
      margin-bottom: 16px;
    }

    .form-row label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-secondary);
      font-size: 0.85em;
      font-weight: 500;
    }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success);
      color: #fff;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 0.85em;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1001;
    }

    .notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .notification.error {
      background: var(--danger);
    }

    /* Custom FAQ Badge */
    .custom-badge {
      font-size: 0.7em;
      background: var(--info);
      color: #fff;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 8px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .record-item {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .record-store {
        text-align: left;
      }
      .faq-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .dashboard-header {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>🔐 FIFI CHECK 管理後台</h1>
      <p>輸入管理員密碼進入</p>
      <div class="form-group">
        <label>管理員密碼</label>
        <input type="password" id="adminPassword" placeholder="請輸入密碼..." onkeydown="if(event.key==='Enter')attemptLogin()">
      </div>
      <button class="btn btn-primary" onclick="attemptLogin()">登入</button>
      <p class="error-msg" id="loginError">密碼錯誤，請重試</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dashboard-header">
      <h1>📊 FIFI CHECK 管理後台</h1>
      <div class="dashboard-actions">
        <button class="btn btn-secondary btn-sm" onclick="logout()">登出</button>
      </div>
    </div>

    <!-- Main Tabs -->
    <div class="main-tabs">
      <button class="main-tab active" onclick="switchTab('records')">📝 對話記錄</button>
      <button class="main-tab" onclick="switchTab('faq')">❓ FAQ 管理</button>
    </div>

    <!-- Records Tab -->
    <div class="tab-content active" id="tabRecords">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <h3>總問題數</h3>
          <div class="value" id="statTotal">0</div>
          <div class="sub">所有記錄</div>
        </div>
        <div class="stat-card">
          <h3>商戶數目</h3>
          <div class="value" id="statStores">0</div>
          <div class="sub">已記錄的 Store ID</div>
        </div>
        <div class="stat-card">
          <h3>今日問題</h3>
          <div class="value" id="statToday">0</div>
          <div class="sub">今日記錄</div>
        </div>
        <div class="stat-card">
          <h3>熱門問題</h3>
          <div class="value" id="statPopular">-</div>
          <div class="sub" id="popularQuestion">-</div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜尋問題或答案..." oninput="filterRecords()">
      </div>

      <!-- Store Tabs -->
      <div class="store-tabs" id="storeTabs"></div>

      <!-- Records -->
      <div class="records-list" id="recordsList"></div>
    </div>

    <!-- FAQ Tab -->
    <div class="tab-content" id="tabFaq">
      <div class="faq-header">
        <div class="faq-filters" id="faqFilters"></div>
        <div class="faq-actions">
          <button class="btn btn-success btn-sm" onclick="showAddFaqModal()">➕ 新增問題</button>
          <button class="btn btn-secondary btn-sm" onclick="exportFaq()">📤 匯出</button>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('importFile').click()">📥 匯入</button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importFaq(event)">
        </div>
      </div>
      <div id="faqCategories"></div>
    </div>
  </div>

  <!-- FAQ Modal -->
  <div class="modal-overlay" id="faqModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="faqModalTitle">新增問題</h2>
        <button class="modal-close" onclick="closeFaqModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>類別</label>
          <select id="faqCategory"></select>
        </div>
        <div class="form-row">
          <label>問題</label>
          <input type="text" id="faqQuestion" placeholder="例如：如何上架新產品？">
        </div>
        <div class="form-row">
          <label>答案</label>
          <textarea id="faqAnswer" placeholder="請輸入完整答案..." rows="8"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeFaqModal()">取消</button>
        <button class="btn btn-primary" id="faqSaveBtn" onclick="saveFaq()">儲存</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width: 400px;">
      <div class="modal-header">
        <h2>⚠️ 確認刪除</h2>
        <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p>確定要刪除這個問題嗎？</p>
        <p id="deleteFaqText" style="font-weight: 500; margin-top: 10px;"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
        <button class="btn btn-danger" onclick="confirmDeleteFaq()">刪除</button>
      </div>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    const ADMIN_PASSWORD = 'Fificheck000';

    // State
    let allRecords = {};
    let filteredRecords = {};
    let currentStore = 'all';
    let currentFilter = 'all';
    let customFaqs = [];
    let editingFaqId = null;
    let deletingFaqId = null;
    let allCategories = [];

    // Login
    function attemptLogin() {
      const pw = document.getElementById('adminPassword').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadAllRecords();
        loadCustomFaqs();
        renderFaqCategories();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function logout() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('adminPassword').value = '';
    }

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      
      if (tab === 'records') {
        document.querySelector('.main-tab:nth-child(1)').classList.add('active');
        document.getElementById('tabRecords').classList.add('active');
      } else {
        document.querySelector('.main-tab:nth-child(2)').classList.add('active');
        document.getElementById('tabFaq').classList.add('active');
      }
    }

    // Records functions
    function loadAllRecords() {
      try {
        const stored = localStorage.getItem('fifi_master_record');
        allRecords = stored ? JSON.parse(stored) : {};
        updateStats();
        renderStoreTabs();
        renderRecords();
      } catch (e) {
        console.error('Error loading records:', e);
        allRecords = {};
      }
    }

    function updateStats() {
      const storeIds = Object.keys(allRecords);
      let total = 0;
      let todayCount = 0;
      const questionCount = {};
      const today = new Date().toDateString();

      storeIds.forEach(storeId => {
        allRecords[storeId].forEach(record => {
          total++;
          if (new Date(record.timestamp).toDateString() === today) {
            todayCount++;
          }
          const q = record.q.toLowerCase();
          questionCount[q] = (questionCount[q] || 0) + 1;
        });
      });

      let maxCount = 0;
      let popularQ = '-';
      Object.keys(questionCount).forEach(q => {
        if (questionCount[q] > maxCount) {
          maxCount = questionCount[q];
          popularQ = q;
        }
      });

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statStores').textContent = storeIds.length;
      document.getElementById('statToday').textContent = todayCount;
      document.getElementById('statPopular').textContent = maxCount > 1 ? maxCount + '次' : '-';
      document.getElementById('popularQuestion').textContent = popularQ.length > 30 ? popularQ.substring(0, 30) + '...' : popularQ;
    }

    function renderStoreTabs() {
      const storeIds = ['all', ...Object.keys(allRecords)];
      const tabsContainer = document.getElementById('storeTabs');
      tabsContainer.innerHTML = storeIds.map(id => `
        <button class="store-tab ${id === currentStore ? 'active' : ''}" onclick="filterByStore('${id}')">
          ${id === 'all' ? '📋 全部' : id}
        </button>
      `).join('');
    }

    function filterByStore(storeId) {
      currentStore = storeId;
      renderStoreTabs();
      renderRecords();
    }

    function filterRecords() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      if (!query) {
        filteredRecords = allRecords;
      } else {
        filteredRecords = {};
        Object.keys(allRecords).forEach(storeId => {
          const filtered = allRecords[storeId].filter(r => 
            r.q.toLowerCase().includes(query) || 
            r.a.toLowerCase().includes(query)
          );
          if (filtered.length > 0) {
            filteredRecords[storeId] = filtered;
          }
        });
      }
      renderRecords();
    }

    function renderRecords() {
      const list = document.getElementById('recordsList');
      let records = [];

      if (currentStore === 'all') {
        Object.keys(filteredRecords).forEach(storeId => {
          filteredRecords[storeId].forEach(record => {
            records.push({ ...record, storeId });
          });
        });
      } else {
        records = (filteredRecords[currentStore] || []).map(r => ({ ...r, storeId: currentStore }));
      }

      if (records.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">💬</div>
            <p>暫時沒有對話記錄</p>
          </div>
        `;
        return;
      }

      records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      list.innerHTML = records.map(r => `
        <div class="record-item">
          <div class="record-time">${new Date(r.timestamp).toLocaleString('zh-HK')}</div>
          <div>
            <div class="record-question">${escapeHtml(r.q)}</div>
            <div class="record-answer">${escapeHtml(r.a).substring(0, 150)}${r.a.length > 150 ? '...' : ''}</div>
          </div>
          <div class="record-store">
            <span>${r.storeId}</span>
          </div>
        </div>
      `).join('');
    }

    function exportAllRecords() {
      let records = [];
      Object.keys(allRecords).forEach(storeId => {
        allRecords[storeId].forEach(record => {
          records.push({ ...record, storeId });
        });
      });

      if (records.length === 0) {
        showNotification('沒有記錄可以匯出', true);
        return;
      }

      const csv = '\uFEFF' + [
        ['Store ID', '時間', '問題', '答案'].join(','),
        ...records.map(r => [
          r.storeId,
          new Date(r.timestamp).toLocaleString('zh-HK'),
          `"${r.q.replace(/"/g, '""')}"`,
          `"${r.a.replace(/"/g, '""')}"`
        ].join(','))
      ].join('\n');

      downloadFile(csv, 'fifi_check_records.csv', 'text/csv;charset=utf-8');
      showNotification('已匯出 ' + records.length + ' 筆記錄');
    }

    // FAQ functions
    function loadCustomFaqs() {
      try {
        const stored = localStorage.getItem('fifi_custom_faq');
        customFaqs = stored ? JSON.parse(stored) : [];
      } catch (e) {
        customFaqs = [];
      }
    }

    function saveCustomFaqs() {
      localStorage.setItem('fifi_custom_faq', JSON.stringify(customFaqs));
    }

    function getAllCategories() {
      if (allCategories.length > 0) return allCategories;
      
      const defaultCategories = {
        '⚙️': { key: 'basicSetup', name: '基本後台設置' },
        '📦': { key: 'productUpload', name: '上載產品' },
        '📊': { key: 'inventory', name: '庫存管理' },
        '📋': { key: 'orders', name: '訂單處理' },
        '🎁': { key: 'promotions', name: '建立優惠活動' },
        '🤝': { key: 'aftersales', name: '售後服務' },
        '💬': { key: 'customerEngagement', name: '客戶互動' },
        '💰': { key: 'commission', name: '佣金與結算' },
        '📞': { key: 'contact', name: '聯絡與支援' },
        '🌍': { key: 'overseas', name: '海外送貨' },
        '🚚': { key: 'logistics', name: 'HKTV 3PL' },
        '🔌': { key: 'api', name: '系統對接 (API)' },
        '🌟': { key: 'newMerchant', name: '新商戶指南' }
      };

      allCategories = Object.entries(defaultCategories).map(([icon, data]) => ({
        icon,
        key: data.key,
        name: data.name
      }));

      // Add custom categories from user-added FAQs
      customFaqs.forEach(faq => {
        if (!allCategories.find(c => c.name === faq.category)) {
          allCategories.push({
            icon: '📂',
            key: 'custom_' + Date.now(),
            name: faq.category
          });
        }
      });

      return allCategories;
    }

    function renderFaqCategories() {
      const categories = getAllCategories();
      const container = document.getElementById('faqCategories');
      const filtersContainer = document.getElementById('faqFilters');

      // Render filters
      filtersContainer.innerHTML = `
        <button class="faq-filter ${currentFilter === 'all' ? 'active' : ''}" onclick="filterFaq('all')">全部</button>
        <button class="faq-filter ${currentFilter === 'custom' ? 'active' : ''}" onclick="filterFaq('custom')">自訂問題</button>
        ${categories.map(c => `
          <button class="faq-filter ${currentFilter === c.name ? 'active' : ''}" onclick="filterFaq('${c.name}')">${c.icon} ${c.name}</button>
        `).join('')}
      `;

      // Render categories with FAQs
      let html = '';

      categories.forEach(cat => {
        const defaultFaqs = FAQ_DATA[cat.key]?.questions || [];
        const catCustomFaqs = customFaqs.filter(f => f.category === cat.name);
        
        let allFaqs = [...defaultFaqs, ...catCustomFaqs.map(f => ({ ...f, isCustom: true }))];

        if (currentFilter !== 'all' && currentFilter !== cat.name && !(currentFilter === 'custom' && catCustomFaqs.length > 0)) {
          return;
        }

        if (currentFilter === 'custom' && catCustomFaqs.length === 0) {
          return;
        }

        if (currentFilter !== 'all' && currentFilter !== 'custom' && currentFilter !== cat.name) {
          return;
        }

        if (allFaqs.length === 0) return;

        html += `
          <div class="faq-category">
            <div class="faq-category-header" onclick="toggleCategory(this)">
              <div class="faq-category-title">
                <span class="icon">${cat.icon}</span>
                <span>${cat.name}</span>
                <span class="faq-category-count">${allFaqs.length}</span>
              </div>
              <span class="faq-category-arrow">▼</span>
            </div>
            <div class="faq-list">
              ${allFaqs.map((faq, idx) => `
                <div class="faq-item" data-id="${faq.isCustom ? faq.id : cat.key + '_' + idx}">
                  <div class="faq-item-header">
                    <div class="faq-item-q">
                      ${escapeHtml(faq.q)}
                      ${faq.isCustom ? '<span class="custom-badge">自訂</span>' : ''}
                    </div>
                    <div class="faq-item-actions">
                      <button class="btn btn-secondary btn-sm" onclick="editFaq('${faq.isCustom ? faq.id : cat.key + '_' + idx}', ${faq.isCustom})">✏️</button>
                      <button class="btn btn-danger btn-sm" onclick="deleteFaq('${faq.isCustom ? faq.id : cat.key + '_' + idx}', ${faq.isCustom})">🗑️</button>
                    </div>
                  </div>
                  <div class="faq-item-a">${escapeHtml(faq.a)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });

      if (!html) {
        html = `
          <div class="empty-state">
            <div class="icon">❓</div>
            <p>這個類別暫時沒有問題</p>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function toggleCategory(header) {
      const category = header.closest('.faq-category');
      category.classList.toggle('collapsed');
    }

    function filterFaq(filter) {
      currentFilter = filter;
      renderFaqCategories();
    }

    function showAddFaqModal() {
      editingFaqId = null;
      document.getElementById('faqModalTitle').textContent = '➕ 新增問題';
      document.getElementById('faqSaveBtn').textContent = '新增';
      
      const categories = getAllCategories();
      document.getElementById('faqCategory').innerHTML = categories.map(c => 
        `<option value="${c.name}">${c.icon} ${c.name}</option>`
      ).join('');
      
      document.getElementById('faqQuestion').value = '';
      document.getElementById('faqAnswer').value = '';
      
      document.getElementById('faqModal').classList.add('show');
    }

    function editFaq(id, isCustom) {
      editingFaqId = id;
      document.getElementById('faqModalTitle').textContent = '✏️ 編輯問題';
      document.getElementById('faqSaveBtn').textContent = '儲存';

      let faq;
      if (isCustom) {
        faq = customFaqs.find(f => f.id === id);
      } else {
        // Find in default FAQ
        for (const [catKey, cat] of Object.entries(FAQ_DATA)) {
          const idx = cat.questions.findIndex((_, i) => catKey + '_' + i === id);
          if (idx !== -1) {
            faq = cat.questions[idx];
            break;
          }
        }
      }

      if (!faq) {
        showNotification('找不到這個問題', true);
        return;
      }

      const categories = getAllCategories();
      document.getElementById('faqCategory').innerHTML = categories.map(c => 
        `<option value="${c.name}" ${c.name === faq.category ? 'selected' : ''}>${c.icon} ${c.name}</option>`
      ).join('');
      
      document.getElementById('faqQuestion').value = faq.q;
      document.getElementById('faqAnswer').value = faq.a;
      
      document.getElementById('faqModal').classList.add('show');
    }

    function saveFaq() {
      const category = document.getElementById('faqCategory').value;
      const question = document.getElementById('faqQuestion').value.trim();
      const answer = document.getElementById('faqAnswer').value.trim();

      if (!question || !answer) {
        showNotification('請填寫問題和答案', true);
        return;
      }

      if (editingFaqId) {
        // Editing existing - find and update
        const idx = customFaqs.findIndex(f => f.id === editingFaqId);
        if (idx !== -1) {
          customFaqs[idx] = { ...customFaqs[idx], q: question, a: answer, category };
          showNotification('已更新問題');
        }
      } else {
        // Adding new
        customFaqs.push({
          id: 'custom_' + Date.now(),
          q: question,
          a: answer,
          category: category,
          createdAt: new Date().toISOString()
        });
        showNotification('已新增問題');
      }

      saveCustomFaqs();
      closeFaqModal();
      renderFaqCategories();

      // Update categories cache
      allCategories = [];
      getAllCategories();
    }

    function closeFaqModal() {
      document.getElementById('faqModal').classList.remove('show');
      editingFaqId = null;
    }

    function deleteFaq(id, isCustom) {
      deletingFaqId = id;
      
      let faqText = '';
      if (isCustom) {
        const faq = customFaqs.find(f => f.id === id);
        faqText = faq ? faq.q : '';
      } else {
        for (const [catKey, cat] of Object.entries(FAQ_DATA)) {
          const idx = cat.questions.findIndex((_, i) => catKey + '_' + i === id);
          if (idx !== -1) {
            faqText = cat.questions[idx].q;
            break;
          }
        }
      }

      document.getElementById('deleteFaqText').textContent = faqText.substring(0, 50) + (faqText.length > 50 ? '...' : '');
      document.getElementById('deleteModal').classList.add('show');
    }

    function confirmDeleteFaq() {
      if (deletingFaqId) {
        const idx = customFaqs.findIndex(f => f.id === deletingFaqId);
        if (idx !== -1) {
          customFaqs.splice(idx, 1);
          saveCustomFaqs();
          showNotification('已刪除問題');
          renderFaqCategories();
        }
      }
      closeDeleteModal();
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('show');
      deletingFaqId = null;
    }

    function exportFaq() {
      const data = {
        exportDate: new Date().toISOString(),
        version: '1.0',
        customFaqs: customFaqs
      };

      const json = JSON.stringify(data, null, 2);
      downloadFile(json, 'fifi_check_faq_export.json', 'application/json');
      showNotification('已匯出自訂問題');
    }

    function importFaq(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (data.customFaqs && Array.isArray(data.customFaqs)) {
            customFaqs = [...customFaqs, ...data.customFaqs.map(f => ({
              ...f,
              id: 'custom_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
            }))];
            saveCustomFaqs();
            allCategories = [];
            getAllCategories();
            renderFaqCategories();
            showNotification('已匯入 ' + data.customFaqs.length + ' 個問題');
          } else {
            showNotification('檔案格式不正確', true);
          }
        } catch (err) {
          showNotification('無法讀取檔案: ' + err.message, true);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // Utility functions
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function showNotification(message, isError = false) {
      const notif = document.getElementById('notification');
      notif.textContent = message;
      notif.className = 'notification show' + (isError ? ' error' : '');
      setTimeout(() => notif.classList.remove('show'), 3000);
    }

    // Initialize
    currentStore = 'all';
  </script>
</body>
</html>
