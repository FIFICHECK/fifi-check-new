<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FIFI CHECK 🐾 — 商戶 AI 助理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
  <style>
/* ================================================
   FIFI CHECK — Japanese Minimalist Style
   ================================================ */
:root {
  --primary: #7c6a5d;
  --primary-light: #a69587;
  --secondary: #c4a98b;
  --accent: #d4a574;
  --bg-light: #faf8f5;
  --bg-card: #ffffff;
  --bg-warm: #f5f0e8;
  --text-primary: #3d3d3d;
  --text-secondary: #7a7a7a;
  --text-muted: #aaaaaa;
  --border: #e8e4de;
  --success: #8fae8b;
  --warning: #d4a574;
  --danger: #c9928a;
  --radius: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-soft: 0 2px 8px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans TC', 'PingFang TC', sans-serif;
  background: var(--bg-light);
  color: var(--text-primary);
  overflow: hidden;
  letter-spacing: 0.02em;
}
.app-container { display: flex; flex-direction: column; height: 100vh; max-width: 100%; }

/* Header */
.header {
  background: var(--bg-card);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.header h1 { font-size: 1.2em; font-weight: 400; color: var(--text-primary); letter-spacing: 0.08em; }
.header-info { display: flex; align-items: center; gap: 16px; }
.store-badge {
  background: var(--bg-warm); padding: 4px 14px; border-radius: 20px;
  font-size: 0.8em; color: var(--text-secondary); border: 1px solid var(--border);
}
.hermes-badge {
  display: flex; align-items: center; gap: 5px;
  background: var(--bg-warm); padding: 5px 12px; border-radius: 20px;
  font-size: 0.75em; cursor: pointer; transition: all 0.2s;
  border: 1px solid var(--border); color: var(--text-secondary);
}
.hermes-badge:hover { background: var(--border); }
.hermes-badge.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.hermes-badge span:first-child { font-size: 13px; }

/* Login */
.login-view { display: flex; align-items: center; justify-content: center; height: 100%; background: var(--bg-light); }
.login-card {
  background: var(--bg-card); padding: 40px 36px; border-radius: var(--radius);
  width: 100%; max-width: 360px; box-shadow: var(--shadow-soft);
  border: 1px solid var(--border); text-align: center;
}
.login-card h2 { font-size: 1.4em; font-weight: 300; margin-bottom: 8px; letter-spacing: 0.15em; }
.login-card .subtitle { color: var(--text-muted); font-size: 0.85em; margin-bottom: 28px; }
.login-desc { color: var(--text-secondary); font-size: 0.8em; margin-bottom: 28px; }
.form-group { margin-bottom: 18px; text-align: left; }
.form-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 0.8em; letter-spacing: 0.05em; }
.form-group input {
  width: 100%; padding: 11px 14px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg-light); color: var(--text-primary);
  font-size: 0.95em; transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(124,106,93,0.1); }
.btn { width: 100%; padding: 12px; border: none; border-radius: var(--radius); font-size: 0.9em; font-weight: 500; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.error-message { color: var(--danger); font-size: 0.8em; margin-top: 10px; display: none; }
.login-footer { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 0.75em; color: var(--text-muted); }
.login-footer a { color: var(--primary); text-decoration: none; }

/* Chat View */
.chat-view { display: none; flex-direction: column; height: 100%; background: var(--bg-light); }
.chat-header {
  background: var(--bg-card); padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.chat-header-info h3 { font-size: 0.95em; font-weight: 400; }
.last-login { color: var(--text-muted); font-size: 0.7em; margin-top: 2px; }
.btn-logout {
  background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
  padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 0.75em; transition: all 0.2s;
}
.btn-logout:hover { background: var(--bg-warm); }
.chat-header-actions { display: flex; align-items: center; gap: 10px; }
.btn-history {
  background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
  padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 0.75em; transition: all 0.2s;
}
.btn-history:hover { background: var(--bg-warm); color: var(--text-primary); }

/* Welcome */
.welcome-screen {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; padding: 30px 20px; text-align: center;
  overflow-y: auto; min-height: 0;
}
.welcome-screen.hidden { display: none !important; }
.welcome-screen h2 { font-size: 1.3em; font-weight: 400; margin-bottom: 10px; letter-spacing: 0.08em; }
.welcome-hint { color: var(--text-muted); font-size: 0.8em; margin-bottom: 16px; }
.preset-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 500px; }
.preset-chip {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
  padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: all 0.2s; font-size: 0.8em;
}
.preset-chip:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Messages */
.messages-container {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 16px; min-height: 0;
}
.message { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.message.user { align-self: flex-end; flex-direction: column; align-items: flex-end; }
.message.assistant { align-self: flex-start; }
.message-avatar {
  width: 32px; height: 32px; background: var(--bg-warm); border: 1px solid var(--border);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.message-content {
  background: var(--bg-card); padding: 10px 14px; border-radius: var(--radius);
  line-height: 1.6; font-size: 0.9em; border: 1px solid var(--border);
}
.message.user .message-content { background: var(--primary); color: #fff; border-color: var(--primary); }
.message-time { font-size: 0.65em; color: var(--text-muted); margin-top: 4px; }

/* Analysis Panel */
.hermes-panel-container { width: 100%; max-width: 80%; align-self: flex-start; animation: fadeIn 0.4s ease; }
.hermes-analysis {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px; color: var(--text-primary);
}
.hermes-analysis-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.hermes-analysis-header span:first-child { font-size: 16px; }
.hermes-analysis-header strong { font-weight: 500; font-size: 0.85em; color: var(--text-primary); }
.confidence-badge { margin-left: auto; padding: 2px 8px; border-radius: 10px; font-size: 0.65em; font-weight: 500; }
.confidence-high { background: rgba(143,174,139,0.2); color: var(--success); }
.confidence-medium { background: rgba(212,165,116,0.2); color: var(--warning); }
.confidence-low { background: rgba(201,146,138,0.2); color: var(--danger); }
.hermes-section { margin-bottom: 10px; }
.hermes-section:last-child { margin-bottom: 0; }
.hermes-section-label { font-size: 0.7em; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 0.05em; }
.hermes-section-content { font-size: 0.85em; line-height: 1.5; color: var(--text-primary); }
.hermes-warning { background: rgba(201,146,138,0.1); padding: 8px 12px; border-radius: var(--radius); margin-top: 10px; font-size: 0.8em; color: var(--danger); }
.hermes-source { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 0.65em; color: var(--text-muted); }

/* Typing */
.typing-indicator { display: none; align-items: center; gap: 8px; padding: 12px 0; color: var(--text-muted); font-size: 0.8em; }
.typing-dots { display: flex; gap: 3px; }
.typing-dot { width: 5px; height: 5px; background: var(--text-muted); border-radius: 50%; animation: typing 1.4s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }
.typing-avatar { font-size: 20px; }

/* Input */
.chat-input-container {
  background: var(--bg-card); padding: 14px 18px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
}
.chat-input {
  flex: 1; background: #ffffff; border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px; color: var(--text-primary);
  font-size: 0.9em; resize: none; max-height: 100px; font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.chat-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,106,93,0.12); }
.chat-input::placeholder { color: var(--text-muted); }
.btn-send {
  width: 40px; height: 40px; background: var(--primary); border: none;
  border-radius: var(--radius); color: #fff; font-size: 16px; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center; opacity: 0.85;
}
.btn-send:not(:disabled) { opacity: 1; }
.btn-send:hover:not(:disabled) { background: var(--primary-light); }

/* Modal */
.modal {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); align-items: center; justify-content: center; z-index: 1000;
}
.modal-content {
  background: var(--bg-card); padding: 28px; border-radius: var(--radius);
  text-align: center; max-width: 320px; border: 1px solid var(--border);
}
.modal-content h3 { font-weight: 400; margin-bottom: 10px; font-size: 1em; }
.modal-content p { font-size: 0.8em; color: var(--text-secondary); margin-bottom: 20px; }
.modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
.modal-buttons .btn { flex: 1; }
.btn-secondary { background: var(--bg-warm); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }

/* API Key Modal */
.api-key-content { max-width: 360px; width: 90%; }
.api-key-content h3 { font-weight: 400; font-size: 1em; margin-bottom: 10px; }
.api-key-content p { font-size: 0.75em; color: var(--text-secondary); margin-bottom: 18px; line-height: 1.5; }
.api-key-content input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg-light); font-size: 0.85em; margin-bottom: 14px;
}
.api-key-content input:focus { outline: none; border-color: var(--primary); }
.api-key-buttons { display: flex; gap: 10px; }
.api-key-buttons .btn { flex: 1; padding: 10px; font-size: 0.8em; }

/* History */
.history-modal-content { max-width: 500px; max-height: 70vh; display: flex; flex-direction: column; }
.history-content { max-height: 400px; overflow-y: auto; margin: 15px 0; padding: 10px 0; }
.history-list { display: flex; flex-direction: column; gap: 16px; }
.history-item { background: var(--bg-warm); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); }
.history-q { font-weight: 500; color: var(--text-primary); margin-bottom: 8px; font-size: 0.9em; }
.history-a { color: var(--text-secondary); font-size: 0.85em; line-height: 1.5; margin-bottom: 8px; }
.history-time { font-size: 0.7em; color: var(--text-muted); }

/* Store suggestions */
.store-suggestions {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
  padding: 10px; background: var(--bg-warm); border-radius: var(--radius); border: 1px solid var(--border);
}
.store-suggestion-btn {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
  padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8em; transition: all 0.2s;
}
.store-suggestion-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Notification */
.notification {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--primary); color: #fff; padding: 12px 24px;
  border-radius: 25px; font-size: 0.85em; opacity: 0;
  transition: all 0.3s ease; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media (max-width: 600px) {
  .message { max-width: 90%; }
  .preset-chips { flex-direction: column; }
  .header h1 { font-size: 1em; }
  .login-card { padding: 30px 24px; }
}
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header" id="header">
      <h1>🐾 FIFI CHECK</h1>
      <div class="header-info">
        <span class="hermes-badge active" id="hermesBadge" title="FIFI查 分析：開啟">
          <span>🧠</span><span>FIFI查</span>
        </span>
        <span class="store-badge" id="storeBadge" style="display:none;"></span>
        <button class="btn-logout" id="btnLogout" style="display:none;">登出</button>
      </div>
    </header>

    <!-- Login View -->
    <div class="login-view" id="loginView">
      <div class="login-card">
        <h2>🐾 FIFI CHECK</h2>
        <p class="subtitle">商戶 AI 助理</p>
        <p class="login-desc">24小時即時回覆您嘅商戶查詢</p>
        <form id="loginForm">
          <div class="error-message" id="errorMessage"></div>
          <div class="form-group">
            <label>Store ID</label>
            <input type="text" id="username" placeholder="輸入 Store ID (H/B/C/P)" autocomplete="username">
          </div>
          <button type="submit" class="btn btn-primary" id="btnLogin">登入</button>
        </form>
        <div class="login-footer">
          <p>📖 資料來源：<a href="https://sites.google.com/view/hktv-merc-faq/" target="_blank">HKTV 商戶支援</a></p>
        </div>
      </div>
    </div>

    <!-- Chat View -->
    <div class="chat-view" id="chatView">
      <div class="chat-header">
        <div class="chat-header-info">
          <h3>🐾 FIFI CHECK — 商戶 AI 助理</h3>
          <p class="last-login" id="lastLogin"></p>
        </div>
        <div class="chat-header-actions">
          <button class="btn-history" id="btnHistory" title="對話記錄">📜 記錄</button>
          <button class="btn-logout" id="btnLogoutTop">登出</button>
        </div>
      </div>

      <div class="welcome-screen" id="welcomeScreen">
        <h2>您好！歡迎使用 FIFI CHECK</h2>
        <p class="welcome-hint">直接輸入您嘅問題，我幫您搵答案 ^^</p>
        <div class="preset-chips" id="presetChips">
          <button class="preset-chip" onclick="askPreset('如何上架新產品？')">如何上架新產品？</button>
          <button class="preset-chip" onclick="askPreset('佣金率是多少？')">佣金率是多少？</button>
          <button class="preset-chip" onclick="askPreset('如何處理訂單發貨？')">如何處理訂單發貨？</button>
          <button class="preset-chip" onclick="askPreset('如何設定優惠活動？')">如何設定優惠活動？</button>
          <button class="preset-chip" onclick="askPreset('如何聯絡我的 RM？')">如何聯絡我的 RM？</button>
          <button class="preset-chip" onclick="askPreset('退款政策是怎樣的？')">退款政策是怎樣的？</button>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer"></div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-avatar">🐾</div>
        <div class="typing-dots">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
        <span>FIFI 思考緊...</span>
      </div>

      <div class="chat-input-container">
        <textarea class="chat-input" id="chatInput" placeholder="輸入您的問題..." rows="1"></textarea>
        <button class="btn-send" id="btnSend" disabled>➤</button>
      </div>
    </div>

    <!-- Logout Modal -->
    <div class="modal" id="logoutModal">
      <div class="modal-content">
        <h3>確認登出？</h3>
        <p>您確定要登出 FIFI CHECK 嗎？</p>
        <div class="modal-buttons">
          <button class="btn btn-secondary" id="btnCancelLogout">取消</button>
          <button class="btn btn-primary" id="btnConfirmLogout">確認登出</button>
        </div>
      </div>
    </div>

    <!-- API Key Modal -->
    <div class="modal" id="apiKeyModal">
      <div class="modal-content api-key-content">
        <h3>設定 OpenRouter API Key</h3>
        <p>輸入您的 OpenRouter API Key 以啟用 Claude AI 分析功能</p>
        <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
        <div class="modal-buttons api-key-buttons">
          <button class="btn btn-secondary" id="btnSkipApiKey">跳過</button>
          <button class="btn btn-primary" id="btnSaveApiKey">儲存</button>
        </div>
      </div>
    </div>

    <!-- History Modal -->
    <div class="modal" id="historyModal">
      <div class="modal-content history-modal-content">
        <h3>📜 我的問答記錄</h3>
        <div class="history-content" id="historyContent">
          <p style="text-align:center;color:var(--text-muted);padding:40px;">暫時未有對話記錄</p>
        </div>
        <div class="modal-buttons">
          <button class="btn btn-primary" id="btnCloseHistory">關閉</button>
        </div>
      </div>
    </div>
  </div>

<script>
// ================================================
// FAQ 知識庫
// ================================================
const FAQ_DATA = {
  basicSetup: {
    category: "基本後台設置", icon: "⚙️",
    questions: [
      { q: "如何登入商戶後台？", a: "要登入 HKTV 商戶後台，請前往 MMS (Merchant Management System)：\nhttps://mms.shoalter.com/mms/\n\n1. 輸入您的 HKTV 帳戶電郵\n2. 輸入密碼\n3. 輸入 Store ID\n4. 點擊登入\n\n如果您忘記密碼，請聯絡 FIFI 查服務團隊或您的 RM。" },
      { q: "如何設定雙重驗證（2FA）？", a: "為保障帳戶安全，建議您啟用雙重驗證：\n\n1. 登入後台後，進入「設定」\n2. 點擊「安全設定」\n3. 選擇「啟用雙重驗證」\n4. 掃描 QR Code 到您的驗證器 App（如 Google Authenticator）\n5. 輸入一次性驗證碼確認\n\n日後登入時需要輸入驗證器顯示的6位數字。" },
      { q: "商戶後台有哪些主要功能？", a: "HKTVmall 商戶後台（MMS）主要功能包括：\n\n📦 商品管理 - 上架、編輯、庫存管理\n📋 訂單管理 - 查看、處理發貨、退款\n💰 財務報告 - GMV、佣金、結算\n🎁 推廣活動 - 建立優惠、折扣\n📊 數據分析 - 銷售報告、流量分析\n👥 帳戶管理 - 員工權限、通知設定" },
      { q: "如何新增後台用戶？", a: "主帳戶可以新增子帳戶給員工：\n\n1. 進入「帳戶設定」\n2. 點擊「用戶管理」\n3. 選擇「新增用戶」\n4. 輸入員工電郵和資料\n5. 設定權限角色（管理員/一般用戶/唯讀）\n6. 發送邀請\n\n員工會收到電郵邀請，點擊連結設定密碼後即可使用。" }
    ]
  },
  productUpload: {

function tokenize(text) {
  return text.toLowerCase().replace(/[^\w\s一-鿿]/g, ' ').split(/\s+/).filter(t => t.length > 0);
}

function getAliases(query) {
  const tokens = tokenize(query);
  const aliases = new Set();
  tokens.forEach(token => {
    Object.entries(KEYWORD_ALIASES).forEach(([key, values]) => {
      if (key.includes(token) || token.includes(key)) {
        aliases.add(key);
        values.forEach(v => aliases.add(v));
      }
    });
  });
  return Array.from(aliases);
}

function similarity(str1, str2) {
  const s1 = str1.toLowerCase(), s2 = str2.toLowerCase();
  if (s1.includes(s2) || s2.includes(s1)) return 0.8;
  const set1 = new Set(s1), set2 = new Set(s2);
  const intersection = [...set1].filter(c => set2.has(c));
  const union = new Set([...set1, ...set2]);
  return intersection.length / union.size;
}

function searchFAQ(query) {
  const q = query.toLowerCase().trim();
  const direct = ALL_FAQ.filter(item =>
    item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q) || item.category.toLowerCase().includes(q)
  );
  if (direct.length > 0) return direct.slice(0, 5);

  const aliases = getAliases(q);
  if (aliases.length > 0) {
    const aliasMatches = ALL_FAQ.filter(item => {
      const text = (item.q + ' ' + item.a).toLowerCase();
      return aliases.some(a => text.includes(a.toLowerCase()));
    });
    if (aliasMatches.length > 0) return aliasMatches.slice(0, 5);
  }

  const keywords = tokenize(q);
  const kwMatches = ALL_FAQ.filter(item => {
    const text = (item.q + ' ' + item.a).toLowerCase();
    return keywords.some(kw => kw.length >= 2 && text.includes(kw));
  });
  if (kwMatches.length > 0) return kwMatches.slice(0, 5);

  return ALL_FAQ
    .map(item => ({ item, score: Math.max(similarity(q, item.q), similarity(q, item.a)) }))
    .filter(r => r.score > 0.3).sort((a, b) => b.score - a.score)
    .map(r => r.item).slice(0, 5);
}

  on(elements.chatInput, 'keydown', handleChatKeydown);
  on(elements.btnSend, 'click', sendMessage);
  on(elements.hermesBadge, 'click', toggleHermesMode);
  on(elements.btnSkipApiKey, 'click', () => {
    hideModal(elements.apiKeyModal);
    localStorage.setItem('fifi_apikey_set', 'true');
  });
  on(elements.btnSaveApiKey, 'click', () => {
    const key = elements.apiKeyInput.value.trim();
    if (key) {
      state.apiKey = key;
      localStorage.setItem('fifi_apikey', key);
      hideModal(elements.apiKeyModal);
      localStorage.setItem('fifi_apikey_set', 'true');
      showNotification('✅ API Key 已設定');
    }
  });
}

function checkAuthStatus() {
  const saved = localStorage.getItem('fifi_user');
  if (saved) {
    state.user = JSON.parse(saved);
    state.isLoggedIn = true;
    state.conversationHistory = [];
    state.messages = [];
    showChatView();
  }
}

function checkApiKeyStatus() {
  const saved = localStorage.getItem('fifi_apikey');
  if (saved) { state.apiKey = saved; }
  else { setTimeout(() => showModal(elements.apiKeyModal), 500); }
}

// ================================================
// Store ID History
// ================================================
function getStoredStoreIds() {
  try { return JSON.parse(localStorage.getItem('fifi_store_history') || '[]'); } catch { return []; }
}

function saveStoreId(id) {
  const history = getStoredStoreIds().filter(x => x !== id);
  history.unshift(id);
  localStorage.setItem('fifi_store_history', JSON.stringify(history.slice(0, 5)));
}

function showStoreIdSuggestions() {
  const history = getStoredStoreIds();
  if (!history.length) return;
  const usernameInput = document.getElementById('username');
  if (!usernameInput) return;
  const old = document.getElementById('storeSuggestions');
  if (old) old.remove();
  let html = '<div class="store-suggestions" id="storeSuggestions">';
  history.forEach(id => { html += `<button class="store-suggestion-btn" onclick="useStoreId('${id}')">${id}</button>`; });
  html += '</div>';
  usernameInput.insertAdjacentHTML('afterend', html);
}

function useStoreId(id) {
  const input = document.getElementById('username');
  if (input) { input.value = id; document.getElementById('storeSuggestions')?.remove(); }
}

// ================================================
// Login / Logout
// ================================================
function handleLogin(e) {
  e.preventDefault();
  const storeId = document.getElementById('username')?.value?.trim();
  if (!storeId) { showError('請輸入 Store ID'); return; }
  if (!/^[HBCPhbcp]\d{6,8}$/.test(storeId)) { showError('Store ID 格式不正確 (例: H1234567)'); return; }
  setLoginLoading(true);
  setTimeout(() => {
    const id = storeId.toUpperCase();
    state.isLoggedIn = true;
    state.user = { username: id, loginTime: new Date() };
    localStorage.setItem('fifi_user', JSON.stringify(state.user));
    saveStoreId(id);
    state.conversationHistory = [];
    state.messages = [];
    showChatView();
    setLoginLoading(false);
  }, 300);
}

function handleLogout() {
  saveConversationHistory();
  state.isLoggedIn = false; state.user = null; state.messages = []; state.conversationHistory = [];
  localStorage.removeItem('fifi_user');
  showLoginView(); hideModal(elements.logoutModal); showStoreIdSuggestions();
}

function showLoginView() { elements.loginView.style.display = 'flex'; elements.chatView.style.display = 'none'; }
function showChatView() {
  elements.loginView.style.display = 'none'; elements.chatView.style.display = 'flex';
  if (elements.storeBadge) { elements.storeBadge.textContent = state.user?.username; elements.storeBadge.style.display = ''; }
  if (elements.btnLogout) elements.btnLogout.style.display = '';
  if (elements.lastLogin && state.user?.loginTime) {
    elements.lastLogin.textContent = `上次登入：${formatTime(new Date(state.user.loginTime))}`;
  }
  if (state.messages.length === 0 && elements.welcomeScreen) elements.welcomeScreen.style.display = 'flex';
}

function showError(msg) {
  if (elements.errorMessage) {
    elements.errorMessage.textContent = msg; elements.errorMessage.style.display = 'block';
    setTimeout(() => { elements.errorMessage.style.display = 'none'; }, 3000);
  }
}

function setLoginLoading(loading) {
  if (elements.btnLogin) {
    elements.btnLogin.disabled = loading;
    elements.btnLogin.textContent = loading ? '登入中...' : '登入';
  }
}

function showModal(modal) { if (modal) modal.style.display = 'flex'; }
function hideModal(modal) { if (modal) modal.style.display = 'none'; }

// ================================================
// Hermes / FIFI查 Toggle
// ================================================
function toggleHermesMode() {
  state.hermesMode = !state.hermesMode;
  if (elements.hermesBadge) {
    elements.hermesBadge.className = state.hermesMode ? 'hermes-badge active' : 'hermes-badge';
    elements.hermesBadge.title = state.hermesMode ? 'FIFI查 分析：開啟' : 'FIFI查 分析：關閉';
  }
}

// ================================================
// Chat Input
// ================================================
function handleChatInput() {
  const has = elements.chatInput.value.trim().length > 0;
  elements.btnSend.disabled = !has;
  elements.btnSend.style.opacity = has ? '1' : '0.5';
}

function handleChatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (elements.chatInput.value.trim()) sendMessage();
  }
}

// ================================================
// Send Message
// ================================================
async function sendMessage() {
  const message = elements.chatInput.value.trim();
  if (!message) return;
  elements.chatInput.value = '';
  handleChatInput();
  if (elements.welcomeScreen) elements.welcomeScreen.classList.add('hidden');
  addMessage('user', message);
  showTyping(true);
  requestAnimationFrame(() => {
    if (elements.messagesContainer) elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
  });
  try {
    const greetingResponse = checkCasualGreeting(message);
    if (greetingResponse) {
      await new Promise(r => setTimeout(r, 600));
      addHermesPanel(greetingResponse);
    } else {
      const faqMatches = searchFAQ(message);
      const hermesAnalysis = state.hermesMode ? await getClaudeAnalysis(message) : null;
      await showAssistantResponse(message, faqMatches, hermesAnalysis);
      state.conversationHistory.push({
        q: message, a: hermesAnalysis?.answer || '', timestamp: Date.now()
      });
    }
  } catch (error) {
    console.error('Error:', error);
    addMessage('assistant', `唉～衰咗... ${error.message}\n\n等我冷靜下先 😅`);
  } finally {
    showTyping(false);
    setTimeout(() => {
      elements.chatInput?.focus();
      if (elements.messagesContainer) elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
    }, 300);
  }
}

async function askPreset(question) { elements.chatInput.value = question; sendMessage(); }

// ================================================
// Claude AI Analysis
// ================================================
function getFAQContext() {
  return ALL_FAQ.map(item => `[${item.category}] ${item.q}\n${item.a}`).join('\n\n');
}

async function getClaudeAnalysis(question) {
  const conversationContext = state.conversationHistory.length > 0
    ? `\n\n之前的對話記錄：\n${state.conversationHistory.slice(-3).map(h => `問：${h.q}\n答：${h.a}`).join('\n')}`
    : '';

  const systemPrompt = `你係 FIFI查，HKTVmall 商戶支援助理 — 幫緊你幫緊你！

風格：口語化、輕鬆風趣、有時加啲emoji，但係又要專業！

用廣東話口吻回答，好似朋友傾偈咁，但係又幫到手。${conversationContext}

FAQ 知識庫：
${getFAQContext()}

請以 JSON 格式回覆（只回覆 JSON，唔好其他文字）：
{
  "answer": "主要答案（輕鬆口語化）",
  "extendedAdvice": "延伸建議/實際操作步驟",
  "relatedCategory": "相關分類名稱",
  "warning": "警示事項（如無則留空字串）",
  "confidence": 0.0
}`;

  // Fallback if no API key
  if (!state.apiKey) return getDefaultResponse(question);

  try {
    const config = API_CONFIG[state.apiProvider];
    const response = await fetch(config.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.apiKey}` },
      body: JSON.stringify({
        model: config.model,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: question }
        ],
        max_tokens: 800,
        temperature: 0.3
      }),
      signal: AbortSignal.timeout(20000)
    });

    if (!response.ok) throw new Error(`API error ${response.status}`);
    const data = await response.json();
    const content = data.choices[0].message.content.trim();
    try {
      const jsonStr = content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
      return JSON.parse(jsonStr);
    } catch {
      return { answer: content, extendedAdvice: '', relatedCategory: '', warning: '', confidence: 0.5 };
    }
  } catch (error) {
    console.log('Claude API failed:', error.message);
    return getDefaultResponse(question);
  }
}

function getDefaultResponse(question) {
  const matches = searchFAQ(question);
  if (matches.length > 0) {
    return {
      answer: `哦～呢個問題好常見！ ${matches[0].a}`,
      extendedAdvice: `參考咗「${matches[0].q}」嘅答案～ 不過每個人情況唔同，最好再問下你嘅 RM 確認下 ^^`,
      relatedCategory: matches[0].category, warning: '', confidence: 0.6
    };
  }
  return {
    answer: '唉～ 今次撞板了，我搵唔到完全 Match 嘅答案比你...',
    extendedAdvice: '建議你直接搵 RM 傾偈，佢哋實幫到你！或者可以試下其他關鍵字再搵過 ^^',
    relatedCategory: '聯絡與支援', warning: '', confidence: 0.2
  };
}

// ================================================
// Display Response
// ================================================
async function showAssistantResponse(userQuestion, faqMatches, hermesAnalysis) {
  if (hermesAnalysis && hermesAnalysis.answer) {
    const conf = hermesAnalysis.confidence || 0.5;
    const confClass = conf >= 0.7 ? 'confidence-high' : conf >= 0.4 ? 'confidence-medium' : 'confidence-low';
    const confText = conf >= 0.7 ? '高' : conf >= 0.4 ? '中' : '低';

    let html = `
      <div class="hermes-analysis">
        <div class="hermes-analysis-header">
          <span>🧠</span>
          <strong>FIFI查 分析</strong>
          <span class="confidence-badge ${confClass}">${confText} — ${Math.round(conf * 100)}%</span>
        </div>
        <div class="hermes-section">
          <div class="hermes-section-label">📝 答案</div>
          <div class="hermes-section-content">${escapeHtml(hermesAnalysis.answer)}</div>
        </div>`;

    if (hermesAnalysis.extendedAdvice) {
      html += `<div class="hermes-section">
        <div class="hermes-section-label">💡 延伸建議</div>
        <div class="hermes-section-content">${escapeHtml(hermesAnalysis.extendedAdvice)}</div>
      </div>`;
    }
    if (hermesAnalysis.relatedCategory) {
      html += `<div class="hermes-section">
        <div class="hermes-section-label">📂 相關分類</div>
        <div class="hermes-section-content">${escapeHtml(hermesAnalysis.relatedCategory)}</div>
      </div>`;
    }
    if (hermesAnalysis.warning) {
      html += `<div class="hermes-warning">⚠️ ${escapeHtml(hermesAnalysis.warning)}</div>`;
    }
    html += `<div class="hermes-source">📖 資料來源：https://sites.google.com/view/hktv-merc-faq/</div></div>`;
    addHermesPanel(html);
  } else {
    addMessage('assistant', '抱歉，FIFI查 分析暫時無法使用。請稍後再試或聯絡您的 RM。');
  }
}

function addHermesPanel(html) {
  const div = document.createElement('div');
  div.className = 'hermes-panel-container';
  div.innerHTML = html;
  if (elements.messagesContainer) {
    elements.messagesContainer.appendChild(div);
    elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
  }
}

// ================================================
// Messages
// ================================================
function addMessage(type, content) {
  const div = document.createElement('div');
  div.className = `message ${type}`;
  const time = formatTime(new Date());
  if (type === 'user') {
    div.innerHTML = `<div class="message-content">${escapeHtml(content)}</div><div class="message-time">${time}</div>`;
  } else {
    div.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content">${formatContent(content)}</div><div class="message-time">${time}</div>`;
  }
  elements.messagesContainer.appendChild(div);
  elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
  state.messages.push({ type, content, time });
}

function formatContent(content) {
  return content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code>$1</code>');
}

function escapeHtml(text) {
  const d = document.createElement('div'); d.textContent = text; return d.innerHTML;
}

function showTyping(show) {
  if (show) {
    elements.typingIndicator.style.display = 'flex';
    elements.messagesContainer.appendChild(elements.typingIndicator);
  } else {
    elements.typingIndicator.style.display = 'none';
  }
}

function formatTime(date) {
  const now = new Date();
  if (date.toDateString() === now.toDateString()) {
    return date.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' });
  }
  return date.toLocaleDateString('zh-HK', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ================================================
// Casual Greeting
// ================================================
function checkCasualGreeting(message) {
  const msg = message.toLowerCase().trim();
  const greetings = ['你好', 'hello', 'hi', '嗨', '早晨', '午安', '晚安', '你好嗎', '喂', '你好呀', 'hello呀', 'hi呀', '早晨呀'];
  if (!greetings.some(g => msg === g || msg === g + '？' || msg === g + '?')) return null;

  const responses = [
    { answer: '👋 你好！我係 **FIFI查**，你嘅 HKTVmall 商戶小幫手！', extendedAdvice: '知道你有好多嘢要搞，頭都大埋啦... 不過唔洗驚！我實幫到你架！有咩想問就儘管開口啦 ^^' },
    { answer: '唉～我喺度等你問嘢咋！😄', extendedAdvice: '我係 **FIFI查**，專幫 HKTVmall 商戶解決疑難雜症！知道你頭痕緊，我一定幫到你掛～' },
  ];
  const r = responses[Math.floor(Math.random() * responses.length)];
  return `<div class="hermes-analysis">
    <div class="hermes-analysis-header"><span>🧠</span><strong>FIFI查</strong><span class="confidence-badge confidence-high">線上閒聊中 ^^</span></div>
    <div class="hermes-section"><div class="hermes-section-label">💬</div><div class="hermes-section-content">${r.answer}</div></div>
    <div class="hermes-section"><div class="hermes-section-label">🤝</div><div class="hermes-section-content">${r.extendedAdvice}</div></div>
  </div>`;
}

// ================================================
// History
// ================================================
function saveConversationHistory() {
  if (!state.conversationHistory.length || !state.user) return;
  localStorage.setItem(`fifi_history_${state.user.username}`, JSON.stringify({
    storeId: state.user.username, conversations: state.conversationHistory, lastUpdated: Date.now()
  }));
}

function showConversationHistory() {
  const content = document.getElementById('historyContent');
  if (!content) return;
  const history = state.conversationHistory || [];
  if (!history.length) {
    content.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">暫時未有對話記錄</p>';
    return;
  }
  let html = '<div class="history-list">';
  history.slice().reverse().forEach(item => {
    const time = new Date(item.timestamp).toLocaleString('zh-HK', { year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    html += `<div class="history-item">
      <div class="history-q">❓ ${escapeHtml(item.q)}</div>
      <div class="history-a">💬 ${escapeHtml(item.a)}</div>
      <div class="history-time">🕐 ${time}</div>
    </div>`;
  });
  html += '</div>';
  content.innerHTML = html;
}

// ================================================
// Notification
// ================================================
function showNotification(msg) {
  const n = document.createElement('div');
  n.className = 'notification'; n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => n.classList.add('show'), 10);
  setTimeout(() => { n.classList.remove('show'); setTimeout(() => n.remove(), 300); }, 2000);
}
</script>
