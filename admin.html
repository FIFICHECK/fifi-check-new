<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFI CHECK 管理後台 📊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7c6a5d;
      --primary-dark: #5a4d42;
      --secondary: #c4a98b;
      --accent: #d4a574;
      --bg-light: #faf8f5;
      --bg-card: #ffffff;
      --bg-warm: #f5f0e8;
      --text-primary: #3d3d3d;
      --text-secondary: #7a7a7a;
      --text-muted: #aaaaaa;
      --border: #e8e4de;
      --success: #8fae8b;
      --warning: #d4a574;
      --danger: #c9928a;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      padding: 40px;
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
    }

    .login-card h1 {
      font-size: 1.4em;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-card p {
      color: var(--text-secondary);
      font-size: 0.85em;
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-secondary);
      font-size: 0.8em;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-light);
      color: var(--text-primary);
      font-size: 0.95em;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9em;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.8em;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    /* Dashboard */
    .dashboard {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .dashboard-header h1 {
      font-size: 1.3em;
      font-weight: 600;
    }

    .dashboard-actions {
      display: flex;
      gap: 10px;
    }

    .btn-export {
      background: var(--success);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 0.85em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-export:hover {
      opacity: 0.9;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 0.85em;
      cursor: pointer;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .stat-card h3 {
      font-size: 0.75em;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 2em;
      font-weight: 600;
      color: var(--text-primary);
    }

    .stat-card .sub {
      font-size: 0.75em;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Store Tabs */
    .store-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .store-tab {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.2s;
    }

    .store-tab:hover {
      background: var(--bg-warm);
    }

    .store-tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* Records List */
    .records-list {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .record-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 150px 1fr 200px;
      gap: 20px;
      align-items: start;
    }

    .record-item:last-child {
      border-bottom: none;
    }

    .record-item:hover {
      background: var(--bg-warm);
    }

    .record-time {
      font-size: 0.8em;
      color: var(--text-muted);
    }

    .record-question {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .record-answer {
      font-size: 0.85em;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .record-store {
      font-size: 0.8em;
      color: var(--text-secondary);
      text-align: right;
    }

    .record-store span {
      background: var(--bg-warm);
      padding: 4px 10px;
      border-radius: 20px;
      display: inline-block;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 3em;
      margin-bottom: 16px;
    }

    /* Search */
    .search-bar {
      margin-bottom: 20px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
      font-size: 0.9em;
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success);
      color: #fff;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 0.85em;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 768px) {
      .record-item {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .record-store {
        text-align: left;
      }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>🔐 FIFI CHECK 管理後台</h1>
      <p>輸入管理員密碼進入</p>
      <div class="form-group">
        <label>管理員密碼</label>
        <input type="password" id="adminPassword" placeholder="請輸入密碼..." onkeydown="if(event.key==='Enter')attemptLogin()">
      </div>
      <button class="btn btn-primary" onclick="attemptLogin()">登入</button>
      <p class="error-msg" id="loginError">密碼錯誤，請重試</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dashboard-header">
      <h1>📊 FIFI CHECK 管理後台</h1>
      <div class="dashboard-actions">
        <button class="btn-export" onclick="exportAllRecords()">📥 匯出 Excel</button>
        <button class="btn-logout" onclick="logout()">登出</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <h3>總問題數</h3>
        <div class="value" id="statTotal">0</div>
        <div class="sub">所有記錄</div>
      </div>
      <div class="stat-card">
        <h3>商戶數目</h3>
        <div class="value" id="statStores">0</div>
        <div class="sub">已記錄的 Store ID</div>
      </div>
      <div class="stat-card">
        <h3>今日問題</h3>
        <div class="value" id="statToday">0</div>
        <div class="sub">今日記錄</div>
      </div>
      <div class="stat-card">
        <h3>熱門問題</h3>
        <div class="value" id="statPopular">-</div>
        <div class="sub" id="popularQuestion">-</div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜尋問題或答案..." oninput="filterRecords()">
    </div>

    <!-- Store Tabs -->
    <div class="store-tabs" id="storeTabs"></div>

    <!-- Records -->
    <div class="records-list" id="recordsList"></div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    const ADMIN_PASSWORD = 'fifiadmin2024'; // 可以改為更安全的密碼
    let allRecords = {};
    let filteredRecords = {};
    let currentStore = 'all';

    function attemptLogin() {
      const pw = document.getElementById('adminPassword').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadAllRecords();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function logout() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('adminPassword').value = '';
    }

    function loadAllRecords() {
      try {
        const stored = localStorage.getItem('fifi_master_record');
        allRecords = stored ? JSON.parse(stored) : {};
        updateStats();
        renderStoreTabs();
        renderRecords();
      } catch (e) {
        console.error('Error loading records:', e);
        allRecords = {};
      }
    }

    function updateStats() {
      const storeIds = Object.keys(allRecords);
      let total = 0;
      let todayCount = 0;
      const questionCount = {};

      const today = new Date().toDateString();

      storeIds.forEach(storeId => {
        allRecords[storeId].forEach(record => {
          total++;
          if (new Date(record.timestamp).toDateString() === today) {
            todayCount++;
          }
          // Count questions (normalize to lowercase)
          const q = record.q.toLowerCase();
          questionCount[q] = (questionCount[q] || 0) + 1;
        });
      });

      // Find most popular question
      let maxCount = 0;
      let popularQ = '-';
      Object.keys(questionCount).forEach(q => {
        if (questionCount[q] > maxCount) {
          maxCount = questionCount[q];
          popularQ = q;
        }
      });

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statStores').textContent = storeIds.length;
      document.getElementById('statToday').textContent = todayCount;
      document.getElementById('statPopular').textContent = maxCount > 1 ? maxCount + '次' : '-';
      document.getElementById('popularQuestion').textContent = popularQ.length > 30 ? popularQ.substring(0, 30) + '...' : popularQ;
    }

    function renderStoreTabs() {
      const storeIds = ['all', ...Object.keys(allRecords)];
      const tabsContainer = document.getElementById('storeTabs');

      tabsContainer.innerHTML = storeIds.map(id => {
        const count = id === 'all'
          ? Object.values(allRecords).reduce((sum, arr) => sum + arr.length, 0)
          : (allRecords[id]?.length || 0);
        const label = id === 'all' ? `全部 (${count})` : `${id} (${count})`;
        return `<button class="store-tab ${id === currentStore ? 'active' : ''}" onclick="selectStore('${id}')">${label}</button>`;
      }).join('');
    }

    function selectStore(storeId) {
      currentStore = storeId;
      renderStoreTabs();
      renderRecords();
    }

    function renderRecords() {
      const container = document.getElementById('recordsList');
      const search = document.getElementById('searchInput').value.toLowerCase();

      let recordsToShow = [];

      if (currentStore === 'all') {
        Object.keys(allRecords).forEach(storeId => {
          allRecords[storeId].forEach(record => {
            recordsToShow.push({ ...record, storeId });
          });
        });
      } else {
        recordsToShow = (allRecords[currentStore] || []).map(record => ({
          ...record,
          storeId: currentStore
        }));
      }

      // Sort by time (newest first)
      recordsToShow.sort((a, b) => b.timestamp - a.timestamp);

      // Filter by search
      if (search) {
        recordsToShow = recordsToShow.filter(r =>
          r.q.toLowerCase().includes(search) ||
          r.a.toLowerCase().includes(search)
        );
      }

      if (recordsToShow.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <p>暫無記錄</p>
          </div>
        `;
        return;
      }

      container.innerHTML = recordsToShow.map(record => {
        const time = new Date(record.timestamp).toLocaleString('zh-HK', {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit'
        });
        return `
          <div class="record-item">
            <div class="record-time">${time}</div>
            <div>
              <div class="record-question">❓ ${escapeHtml(record.q)}</div>
              <div class="record-answer">💬 ${escapeHtml(record.a)}</div>
            </div>
            <div class="record-store">
              <span>${record.storeId}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterRecords() {
      renderRecords();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function exportAllRecords() {
      const storeIds = Object.keys(allRecords);

      if (storeIds.length === 0) {
        showNotification('暫無記錄可以匯出');
        return;
      }

      let csv = '\uFEFF'; // BOM for UTF-8
      csv += 'Store ID,時間,問題,答案\n';

      storeIds.forEach(storeId => {
        allRecords[storeId].forEach(item => {
          const time = new Date(item.timestamp).toLocaleString('zh-HK', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
          });
          const q = `"${item.q.replace(/"/g, '""')}"`;
          const a = `"${item.a.replace(/"/g, '""')}"`;
          csv += `${storeId},${time},${q},${a}\n`;
        });
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const date = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `FIFI_CHECK_後台記錄_${date}.csv`;
      link.click();
      URL.revokeObjectURL(url);

      showNotification('📥 匯出成功！');
    }

    function showNotification(message) {
      const notif = document.getElementById('notification');
      notif.textContent = message;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
